  <script>
    var asearch=document.getElementsByClassName('search')[0];
    var albt=document.getElementsByClassName('lbt')[0];
	var abar=document.getElementsByClassName('bar')[0];
	var aLi=albt.querySelectorAll("li");
	var aSpan=abar.querySelectorAll("span");
    var amenu=document.getElementsByClassName('menu')[0];
    var oSpan=amenu.querySelectorAll("span");
    var oLi=asearch.querySelectorAll("li");
	var oa=asearch.querySelectorAll("a");
	var aName=[];
	var index=0;
	var timer;
 play();
	setColor();
	for(var item of aLi){
	aName.push(item.classList[0]);
    //console.log(aName);
	}
	function nextp(){
	aName.unshift(aName[2]);
    aName.pop();
	for(var i=0,length=aLi.length;i<length;i++) {
	 aLi[i].setAttribute("class",aName[i]);
	 }	 
	 index++;
	 if(index>2)index=0;
	 setColor();
	}
	function prep(){
	aName.push(aName[0]);
    aName.shift();
	for(var i=0,length=aLi.length;i<length;i++) {
	 aLi[i].setAttribute("class",aName[i]);
	 }	
	 index--;
	 if(index<0)index=2;
	 setColor();
	}
	function setColor(){
    for(var item of aSpan){
	  item.style.backgroundColor="#fff";
	 }
    aSpan[index].style.backgroundColor="#999";
	}    	
oSpan[0].onclick=function(){
prep();
}
oSpan[1].onclick=function(){
nextp();
}
function play(){
	timer=setInterval(function(){ 
	   nextp(); },5000);
}
albt.onmouseover=function(){clearInterval(timer);}
albt.onmouseout=function(){play();}

}
}
