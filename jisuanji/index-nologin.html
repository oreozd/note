<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>首页未登录</title>
		<link rel="stylesheet" href="layui/css/layui.css" />
		<script src="layui/layui.all.js"></script>
		<script src="js/jquery-1.7.1.min.js"></script>
		<style>
			* {
				padding: 0px;
				margin: 0px;
			}

			body {
				margin: 0 auto;
				font-family: "microsoft yahei";
				border-radius: 5px;
			}

			a {
				text-decoration: none;
			}

			ul li {
				list-style-type: none;
			}

			header {
				width: 100%;
				height: 56px;
				background-repeat: no-repeat;
				background-color: rgb(7, 8, 21);
				color: rgb(184, 186, 183);
				font-size: 22px;
				font-weight: 400;
				box-shadow: #007DDB;
			}

			header span {
				line-height: 56px;
				padding-left:30px;
			}
			header span:hover {
				color:#fff;
			}

			.header-text {
				margin-right: 50px;
				float: right;
				line-height: 56px;
				font-size: 18px;
				color: rgb(184, 186, 183);
			}

			.header-text a {
				color: rgb(184, 186, 183);
				padding: 10px;
				font-size: 18px;
			}

			.header-text span {
				line-height: 56px;
				font-size: 18px;
				color: rgb(184, 186, 183);
			}

			.header-text a:hover {
				color: #fff;
			}

			.headimg {
				height: 550px;
				background-image: url(images/img-index/bg2.jpeg);
				background-size: 100% 550px;
				background-repeat: no-repeat;
				position: relative;
				z-index: 1;
				box-sizing: border-box;
			}
			.headimg:after {
				content: "";
				width: 100%;
				height: 100%;
				position: absolute;
				left: 0;
				top: 0;
				background: inherit;
				filter: blur(5px);
				z-index: 2;
			}
			.titletext {
				position: absolute;
				top: 220px;
				height: 300px;
				left: 30%;
				z-index: 3;
			}

			.layui-icon-release {
				font-size: 80px;
				color: rgb(184, 186, 183);
				position: relative;
				display: block;
				text-align: center;
				display: block;
			}
			
			.titletext .bigword {
				font-size: 50px;
				font-weight: 400;
				color: rgb(184, 186, 183);
				word-spacing: initial;
				position: relative;
				display: block;
				text-align: center;
				margin-bottom: 10px;
				margin-top:30px;
			}

			.titletext .littleword {
				font-size: 20px;
				font-weight: 200;
				color: rgb(184, 186, 183);
				text-align: center;
				word-spacing: initial;
				position: relative;
				display: block;
				text-align: center;
			}
			.titletext .bigword:hover {
				color:#fff;
			}
			
			.titletext .littleword {
				color: rgb(184, 186, 183);
			}
			.titletext .littleword:hover{
				color:#fff;
			}
			.totaldes ul {
				width: 90%;
				display: flex;
				margin-top: 50px;
				margin-bottom: 20px;
				margin: 50px auto 20px auto;
			}

			.totaldes ul li {
				text-align: center;
				flex: 1;
				display: inline-block;
			}

			.box {
				width: 280px;
				height: 150px;
				border: 1px solid #eee;
				margin: 0 auto;
				border-radius: 5px;
				padding: 30px;
			}

			.box:hover {
				border-color: #9D9D9D;
			}

			.layui-elem-field {
				width: 280px;
				height: 150px;
				margin: auto;
				color:#9D9D9D;
			}
			.layui-field-title {
				border-top: 1px solid #eee;
				color:#9D9D9D;
			}

			legend {
				text-align: center;
				color:#9D9D9D;
			}

			h3 {
				margin: 0 auto;
				color: #9D9D9D;
				width: 150px;
				height: 100px;
				/* 设置背景图片的大小,这是今天新学到的属性 */
				line-height: 70px;
				padding-left: 50px;
			}

			/* 底部 */
			footer {
				position: relative;
				margin: 0 auto;
				margin-top: 20px;
			}

			footer .bgimg {
				height: 200px;
				background-image: url(images/img-index/网站背景1.png);
				background-repeat: repeat-x;
				filter: opacity(40%);
			}

			footer .footertext {
				position: absolute;
				width: 100%;
				height: 100px;
				top: 100px;
			}

			footer p {
				text-align: center;
				font-size: 18px;
				color:#393D49;
			}
			
			
			/* 动画部分代码 */
			.flybox{
				width: 80px;
				height:80px;
				margin:auto;
			}
				
			@-webkit-keyframes pic {
			  0% {
			    -webkit-transform: rotate(0deg) scale(1);
			    opacity: 0.3;  /*透明度*/
			  }
			  40% {
			    -webkit-transform: rotate(30deg) scale(1.5);
			    opacity: 0.6;
			  }
			  60% {
			    -webkit-transform: rotate(15deg) scale(1.2);
			    opacity: 0.9;
			  }
			  90% {
			    -webkit-transform: rotate(0deg) scale(0.8);
			    opacity: 1;
			  }
			}
			@-moz-keyframes pic {
			  0% {
			    -moz-transform: rotate(0deg) scale(1);
			    opacity: 0.3;  /*透明度*/
			  }
			  40% {
			    -moz-transform: rotate(30deg) scale(1.5);
			    opacity: 0.6;
			  }
			  60% {
			    -moz-transform: rotate(15deg) scale(1.2);
			    opacity: 0.9;
			  }
			  90% {
			    -moz-transform: rotate(0deg) scale(0.8);
			    opacity: 1;
			  }
			}
			.flybox:hover{ /*鼠标经过box盒子时img动画情况*/  
			    animation-name: pic;  /*动画名字是pic，与上面定义的名字一样*/
			    animation-duration: 1s;  /*动画用时1s*/
			    animation-timing-function: linear;  /*匀速动画*/
			}
		</style>
	</head>

	<body>
		<!--描述：头部-->

		<header>
			<span>
				<i class="layui-icon layui-icon-app" style="font-size: 30px;line-height:30px;"></i>   
				大学计算机分享交流平台
			</span>
			<div class="header-text">
				<a href="rigester.html">注册</a>
				<a>|</a>
				<a href="login.html">登录</a>
			</div>
		</header>
		<!-- 内容主体部分 -->
		<div class="container">
			<div class="headimg">
			</div>
			<div class="titletext">
				<div class="flybox">
					<i class="layui-icon layui-icon-release"></i>
				</div>
				<span class="bigword">传统课程新的解决方案</span>
				<span class="littleword">积极推进课程改革，为传统课程注入新的灵魂</span>
			</div>
			<!-- 板块综述 -->
			<div class="totaldes">
				<ul>
					<li>
						<div class="box">
							<fieldset class="layui-elem-field layui-field-title">
								<legend>案例</legend>
								<div class="layui-field-box">
									精选教学案例可以让学生和教师都可以发表自己的看法和见解
								</div>
							</fieldset>
						</div>
					</li>
					<li>
						<div class="box">
							<fieldset class="layui-elem-field layui-field-title">
								<legend>项目</legend>
								<div class="layui-field-box">
									精选教学案例可以让学生和教师都可以发表自己的看法和见解
								</div>
							</fieldset>
						</div>
					</li>
					<li>
						<div class="box">
							<fieldset class="layui-elem-field layui-field-title">
								<legend>问卷</legend>
								<div class="layui-field-box">
									精选教学案例可以让学生和教师都可以发表自己的看法和见解
								</div>
							</fieldset>
						</div>
					</li>
				</ul>
			</div>
		</div>

		<div id="footer"></div>

		<script>
			$(document).ready(function() {
				$("#footer").load("footer.html");
			});
			// 检测到每个一个点击的标题
			var uls = document.getElementsByTagName('ul')[0];
			console.log(uls);
			uls.addEventListener('click', function(e) {
				var event = e || window.event; //短路表达式
				//监听事件源
				var src = event.target || event.srcElement;
				console.log("标题整体的内容=" + src.innerText);
				alert("感谢您的拜访登录之后查看更多详细信息")
			}, false);
			
			var boxs=document.getElementsByClassName("box");
			for(let i=0;i<boxs.length;i++){
				boxs[i].onmouseenter=function(){
					var targetbox=boxs[i].getElementsByTagName("fieldset")[0];
					var lengend=targetbox.getElementsByTagName('legend')[0];
					var fieldbox=targetbox.getElementsByClassName('layui-field-box')[0];
					lengend.style.color="black";
					fieldbox.style.color="black";
				}
				boxs[i].onmouseleave=function(){
					var targetbox=boxs[i].getElementsByTagName("fieldset")[0];
					var lengend=targetbox.getElementsByTagName('legend')[0];
					var fieldbox=targetbox.getElementsByClassName('layui-field-box')[0];
					lengend.style.color="gray";
					fieldbox.style.color="gray";
				}
			}
		</script>
	</body>
</html>
