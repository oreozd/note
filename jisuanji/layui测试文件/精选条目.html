<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
		<link rel="stylesheet" href="layui/css/layui.css" />
		<script src="layui/layui.all.js"></script>
		<style>
			* {
				padding: 0px;
				margin: 0px;
			}

			body {
				margin: 0 auto;
				font-family: "microsoft yahei";
				border-radius: 5px;
			}

			a {
				text-decoration: none;
			}

			ul li {
				list-style-type: none;
			}

			header {
				width: 100%;
				height: 56px;
				background-color: #8198ca;
				background-repeat: no-repeat;
				color: #fff;
				font-size: 18px;
			}

			header span {
				line-height: 56px;
			}

			.header-text {
				margin-right: 50px;
				float: right;
				line-height: 56px;
				font-size: 18px;
				color: #fff;
			}

			.header-text a {
				color: #fff;
				padding: 10px;
			}

			.header-text span {
				line-height: 56px;
				font-size: 18px;
				color: #fff;
			}

			.header-text a:hover {
				color: red;
			}

			.headimg {
				height: 600px;
				background-color: lavender;
				background-image: url(img/bg.png);
				background-size: 100% 600px;
				background-repeat: no-repeat;
			}

			.totaldes ul {
				width: 90%;
				display: flex;
				margin-top: 50px;
				margin-bottom: 20px;
				margin: 50px auto 20px auto;
			}

			.totaldes ul li {
				text-align: center;
				flex: 1;
				display: inline-block;
			}

			.box {
				width: 280px;
				height: 150px;
				border: 1px solid #eee;
				margin: 0 auto;
				border-radius: 5px;
				padding: 30px;
			}

			.box:hover {
				background-color: #eee;
				opacity: 0.5;
				border-color: #9D9D9D;
			}

			.layui-elem-field {
				width: 280px;
				height: 150px;
				margin: auto;
				/* background-color: lemonchiffon; */
			}

			.layui-field-title {
				border-top: 1px solid #eee;
			}

			legend {
				text-align: center;
			}

			h3 {
				margin: 0 auto;
				color: #9D9D9D;
				width: 150px;
				height: 100px;
				/* 设置背景图片的大小,这是今天新学到的属性 */
				line-height: 70px;
				padding-left: 50px;
			}

			.childbox{
				width:90%;
				margin:0 auto;
			}
			.childbox img {
				width: 80px;
				height: 80px;
				text-align: center;
			}
			
			.case-des{
				position:relative;
			}
			.case-des table {
				margin: 20px auto;
				width: 90%;
				height: 150px;
				/* background-color:rgba(238, 238, 238, 0.5); */
				border-radius: 5px;
				padding: 20px;
				border-collapse: collapse;
				border: none;

			}

			.case-des table tr td {
				border-bottom: 1px #ddd solid;
			}

			.case-des table tr:hover {
				background-color: #eee;
			}

			.case-des .ititle a {
				color: #9D9D9D;
				font-size: 16px;
				padding-left: 15px;
			}

			.case-des .ititle a:hover {
				color: red;
			}

			.case-des .itime {
				text-align: right;
				color: #9D9D9D;
				font-size: 14px;
				padding-right: 50px;
			}
			.layui-icon-next{
				position:absolute;/* 绝对定位,参照物需要设置相对定位 */
				font-size:28px;
				color:#9D9D9D;
				top:90px;
				right:100px;
			}
			.layui-icon-next:hover{
				color: lightcoral;
			}
			footer {
				margin: 0 auto;
				width: 90%;
				height: 100px;
				opacity: 0.8;
				text-align: center;
				margin-top: 20px;
				padding-top: 50px;
			}
		</style>
	</head>

	</body>
