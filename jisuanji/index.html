<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>登录后的首页</title>
		<link rel="stylesheet" href="layui/css/layui.css" />
		<link rel="stylesheet" href="css/style.css" />
		<script src="layui/layui.all.js"></script>
		<script src="js/jquery-1.7.1.min.js"></script>
		<style>
			* {
				padding: 0px;
				margin: 0px;
			}

			body {
				margin: 0 auto;
				font-family: "microsoft yahei";
				border-radius: 5px;
				background-color: #f5f6f7;
				font-family: "microsoft yahei";
			}

			a {
				text-decoration: none;
			}

			ul li {
				list-style-type: none;
			}

			header {
				width: 100%;
				height: 56px;
				background-repeat: no-repeat;
				background-color: rgb(7, 8, 21);
				color: rgb(184, 186, 183);
				font-size: 22px;
				font-weight: 400;
				box-shadow: #007DDB;
			}
			
			header span {
				line-height: 56px;
				padding-left:30px;
			}
			
			.header-text {
				margin-right: 50px;
				float: right;
				line-height: 56px;
				font-size: 18px;
				color: rgb(184, 186, 183);
			}
			header span{
				line-height: 56px;
				color: rgb(184, 186, 183);;
			}
			header span a{
				line-height: 56px;
				color: rgb(184, 186, 183);;
			}
			header span a:hover{
				color:lightgrey;
			}
			
			.header-text span {
				line-height: 56px;
				font-size: 18px;
				color: rgb(184, 186, 183);
			}
			
			.header-text span:hover {
				color: #fff;
			}
			
			
			.headimg {
				height: 550px;
				background-image: url(images/img-index/bg2.jpeg);
				background-size: 100% 550px;
				background-repeat: no-repeat;
				position: relative;
				z-index: 1;
				box-sizing: border-box;
			}
			.headimg:after {
				content: "";
				width: 100%;
				height: 100%;
				position: absolute;
				left: 0;
				top: 0;
				background: inherit;
				filter: blur(5px);
				z-index: 2;
			}
			.titletext {
				position: absolute;
				top: 250px;
				height: 300px;
				left: 30%;
				z-index: 3;
			}
			
			.layui-icon-release {
				font-size: 80px;
				color: rgb(184, 186, 183);
				position: relative;
				display: block;
				text-align: center;
			}
			.titletext .bigword {
				font-size: 50px;
				font-weight: 400;
				color: rgb(184, 186, 183);
				word-spacing: initial;
				position: relative;
				display: block;
				text-align: center;
				margin-bottom: 10px;
				margin-top:30px;
			}
			
			.titletext .littleword {
				font-size: 20px;
				font-weight: 200;
				color: rgb(184, 186, 183);
				text-align: center;
				word-spacing: initial;
				position: relative;
				display: block;
				text-align: center;
			}
			.titletext .bigword:hover {
				color:#fff;
			}
			
			.titletext .littleword {
				color: rgb(184, 186, 183);
			}
			.titletext .littleword:hover{
				color:#fff;
			}
			.container {
				width: 100%;
				min-height: 1000px;
			}
			.totaldes ul {
				width: 90%;
				display: flex;
				margin-top: 50px;
				margin-bottom: 20px;
				margin: 50px auto 20px auto;
			}

			.totaldes ul li {
				text-align: center;
				flex: 1;
				display: inline-block;
			}

			.box {
				width: 280px;
				height: 150px;
				border: 1px solid #eee;
				margin: 0 auto;
				border-radius: 5px;
				padding: 30px;
			}

			.box:hover {
				background-color: rgba(238, 238, 238, 0.7);
				color: #9D9D9D;
				border-color: #9D9D9D;
			}

			.layui-elem-field {
				width: 280px;
				height: 150px;
				margin: auto;
			}

			.layui-field-title {
				border-top: 1px solid #eee;
			}

			legend {
				text-align: center;
			}

			h3 {
				margin: 0 auto;
				color: #9D9D9D;
				width: 150px;
				height: 100px;
				/* 设置背景图片的大小,这是今天新学到的属性 */
				line-height: 70px;
				padding-left: 50px;
			}

			.childbox {
				width: 90%;
				margin: 0 auto;
			}

			.childbox img {
				width: 80px;
				height: 80px;
				text-align: center;
			}
			
			/* 动画部分代码 */
			.flybox{
				width: 80px;
				height:80px;
				margin:auto;
			}
				
			@-webkit-keyframes pic {
			  0% {
			    -webkit-transform: rotate(0deg) scale(1);
			    opacity: 0.3;  /*透明度*/
			  }
			  40% {
			    -webkit-transform: rotate(30deg) scale(1.5);
			    opacity: 0.6;
			  }
			  60% {
			    -webkit-transform: rotate(15deg) scale(1.2);
			    opacity: 0.9;
			  }
			  90% {
			    -webkit-transform: rotate(0deg) scale(0.8);
			    opacity: 1;
			  }
			}
			@-moz-keyframes pic {
			  0% {
			    -moz-transform: rotate(0deg) scale(1);
			    opacity: 0.3;  /*透明度*/
			  }
			  40% {
			    -moz-transform: rotate(30deg) scale(1.5);
			    opacity: 0.6;
			  }
			  60% {
			    -moz-transform: rotate(15deg) scale(1.2);
			    opacity: 0.9;
			  }
			  90% {
			    -moz-transform: rotate(0deg) scale(0.8);
			    opacity: 1;
			  }
			}
			.flybox:hover{ /*鼠标经过box盒子时img动画情况*/  
			    animation-name: pic;  /*动画名字是pic，与上面定义的名字一样*/
			    animation-duration: 1s;  /*动画用时1s*/
			    animation-timing-function: linear;  /*匀速动画*/
			}
		</style>
	</head>

	<body>
		<div id="header"></div>
		<!-- 内容主体部分 -->
		<div class="container">
			<!-- 头图 -->
			<div class="headimg">
			</div>
			<div class="titletext">
				<div class="flybox">
					<i class="layui-icon layui-icon-release"></i>
				</div>
				<span class="bigword">传统课程新的解决方案</span>
				<span class="littleword">改革创新积极进取，为传统课程注入新的灵魂，新鲜活力</span>
			</div>
			<!-- 板块综述 -->
			<div class="totaldes">
				<ul>
					<li>
						<div class="box">
							<a href="anli.html">
								<fieldset class="layui-elem-field layui-field-title">
									<legend>案例</legend>
									<div class="layui-field-box">
										精选教学案例可以让学生和教师都可以发表自己的看法和见解
									</div>
								</fieldset>
							</a>
						</div>
					</li>
					<li>
						<div class="box">
							<a href="project.html">
								<fieldset class="layui-elem-field layui-field-title">
									<legend>项目</legend>
									<div class="layui-field-box">
										精选教学案例可以让学生和教师都可以发表自己的看法和见解
									</div>
								</fieldset>
							</a>
						</div>
					</li>
					<li>
						<div class="box">
							<a href="wenjuan.html">
								<fieldset class="layui-elem-field layui-field-title">
									<legend>问卷</legend>
									<div class="layui-field-box">
										精选教学案例可以让学生和教师都可以发表自己的看法和见解
									</div>
								</fieldset>
							</a>
						</div>
					</li>
				</ul>
			</div>
		</div>
		<div id="footer"></div>

		<script>
			$(document).ready(function() {
				$("#footer").load("footer.html");
				// 页面头部加载完毕
				$("#header").load("header.html", function() {
					var userInfo=header.getElementsByTagName("span")[1];
					var username = sessionStorage.getItem("username");
					userInfo.innerHTML=username;
					
// 					//给头部用户信息绑定事件
// 					userInfo.onmouseenter = function() {
// 						document.getElementById("user-detail").style.visibility = "visible";
// 					}
// 					var contentbox = document.getElementsByClassName("container")[0];
// 					contentbox.onclick = function() {
// 						//alert("被点击");
// 						document.getElementById("user-detail").style.visibility = "hidden";
// 					}
				});
			});
							
							
		</script>
	</body>
</html>
