<!doctype html>
<html lang="en">
	<head>

		<link rel="stylesheet" href="layui/css/layui.css" />
		<link href="css/style.css" rel="stylesheet" type="text/css">
		<script src="js/jquery-1.7.1.min.js"></script>
		<style>
			.container{
				width:75%;
				min-height:500px;
				margin:auto;
				padding:0;
				background-color:#fff;
				margin-top:0px;
			  }
			  form{
				margin-top:100px;
			  }
			  .content{
				font-size: 16px;
				color: #5a688e;
				font-weight: 400;
				text-align:center;
			  }
			.inputbox{
				width:60%;
				margin:0 auto;
				background-color: lavender;
			}
		</style>
	</head>
	<body>
		<div id="header"></div>
		<div class="container">
			<div>
				<span class="layui-breadcrumb">
					<a href="login.html">登录</a>
					<a><cite>找回密码</cite></a>
				</span>
			</div>
			<div class="content">
				<form class="layui-form" action="">

					<div class="layui-form-item inputbox">
						<label class="layui-form-label">填写注册邮箱</label>
						<div class="layui-input-inline">
							<input type="text" name="email" lay-verify="email" autocomplete="off" class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<div class="layui-input-block">
							<button class="layui-btn" lay-submit="" lay-filter="demo1">立即提交</button>
							<button type="reset" class="layui-btn layui-btn-primary">重置</button>
						</div>
					</div>
				</form>
			</div>

		</div>
		<!--底部-->
		<div id="footer"></div>
		<script>
			$(document).ready(function() {
				$("#footer").load("footer.html");
				// 页面头部加载完毕
				$("#header").load("header.html", function() {
					var userInfo = header.getElementsByTagName("span")[1];
					var username = sessionStorage.getItem("username");
					userInfo.innerHTML = username;

					//给头部用户信息绑定事件
					userInfo.onmouseenter = function() {
						document.getElementById("user-detail").style.visibility = "visible";
					}
					var contentbox = document.getElementsByClassName("container")[0];
					contentbox.onclick = function() {
						//alert("被点击");
						document.getElementById("user-detail").style.visibility = "hidden";
					}
				});
			});

			function submitBtn() {
				var postData = ''; //获取到的邮箱地址,在这里的
				$.ajax({ //
					type: "post", //要用post方式                 
					url: "/sendemail", //方法所在页面和方法名
					data: postData,
					dataType: "json",
					success: function(data) {

					},
					error: function(err) {
						console.log(err);
					}
				});
			}
		</script>

		<script src="layui/layui.all.js"></script>
	</body>
</html>
