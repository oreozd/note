<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="Generator" content="EditPlus®">
		<title>注册</title>
		<link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
		<script src="js/jquery-1.7.1.min.js"></script>
		<style>
			*
			{
				margin:0;
				padding:0;
				font-family: "microsoft yahei";
			}

			.bgimg
			{
				width:100%;
				height:600px;
				background:url(images/背景.jpg);
				filter:opacity(60%);
			}

			.container
			{
				width:500px;
				height:490px;
				position:absolute;
				background-color:rgba(95,184,120,0.7);
				top:70px;
				left:32%
			}

			.banner
			{
				font-size:22px;
				font-weight:400;
				color:#fff;
				text-align:center;
				letter-spacing:20px;
				padding:15px 0;
			}

			.info
			{
				width:330px;
				padding:0 85px;
			}

			.box input
			{
				background:#fff;
				width:100%;
				border:none;
				margin-bottom:20px;
				text-indent:45px;
				outline:0;
				font-size:14px;
				border-radius:3px;
				padding:10px 0;
			}

			i.fa
			{
				position:absolute;
				margin-left:8px;
				color:#616161;
				line-height:38px;
			}

			.fa-lock
			{
				font-size:1.5em;
			}

			.fa-envelope-o,.fa-mortar-board
			{
				font-size:1.5em;
			}

			.submit
			{
				width:100px;
				height:35px;
				background:#f1f1ef;
				color:#868583;
				border:none;
				line-height:35px;
				text-align:center;
				font-size:18px;
				border-radius:3px;
				cursor:pointer;
				float:left;
				margin-top:5px;
				margin-left:46px;
			}

			a
			{
				display:block;
				height:50px;
				line-height:50px;
				clear:both;
				text-align:center;
				font-size:16px;
				text-decoration:none;
			}

			.fa-user-o,.fa-book
			{
				font-size:1.5em;
			}
			
			.box{
				position: relative;
			}
			#text{
				position:absolute;
				top:10px;
				right:-75px;
			}
			
			.utype{
				position: relative;
				line-height: 30px;
				display: inline;
				margin:auto;
			}
			.utype span{
				margin-left:10px;
			}
			input[type="radio"] {
				width: 18px;
				height: 18px;
				opacity: 0;
			}
			
			label {
				position: absolute;
				left: 5px;
				top: 3px;
				width: 18px;
				height: 18px;
				border-radius: 50%;
				border: 1px solid #999;
			}
			
			/*设置选中的input的样式*/
			/* + 是兄弟选择器,获取选中后的label元素*/
			input:checked+label { 
				background-color: #009688;
				border: 1px solid #009E94;
			}
			
			input:checked+label::after {
				position: absolute;
				content: "";
				width: 5px;
				height: 10px;
				top: 3px;
				left: 6px;
				border: 2px solid #fff;
				border-top: none;
				border-left: none;
				transform: rotate(45deg)
			}
		</style>
	</head>
	<body>
		<div class="wallpaper">
			<div class="bgimg"></div>
			<div class="container">
				<div class="banner">注册</div>
				<div class="info">
					<form name="registe" action="" method="post">
						<div class="box">
							<i class="fa fa-user-o"></i>
							<input type="text" name="user" placeholder="用户名 (学号/工号)" autocomplete="off" onblur="testName()" id="username" />
							<!-- 提示语 -->
							<span id="text" style="font-size: 12px; color:white"></span>
							<i class="fa fa-lock"></i>
							<input type="password" name="password" placeholder="密码 (6-20位字符)" maxlength="20" tabindex="2" autocomplete="off"
							 required id="password" />
							<i class="fa fa-envelope-o"></i>
							<input type="text" name="email" placeholder="邮箱" tabindex="3" autocomplete="off" required id="email" />
							<i class="fa fa-mortar-board"></i>
							<input type="text" name="realname" placeholder="真实姓名" tabindex="4" autocomplete="off" id="realname" />
							<i class="fa fa-book"></i>
							<input type="text" name="cname" placeholder="所在班级/部门" tabindex="5" autocomplete="off" id="cname" />
							<!-- 用户注册类别 -->
							<div class="utype">
								<input id="uadmin" type="radio" name="utype" checked value="0">
								<label for="uadmin"></label>
								<span>管理员</span>
							</div>
							<div class="utype">
								<input id="ustudent" type="radio" name="utype" value="1">
								<label for="ustudent"></label>
								<span>学生</span>
							</div>
							<div class="utype">
								<input id="uteacher" type="radio" name="utype" value="2">
								<label for="uteacher"></label>
								<span>教师</span>
							</div>

						</div>
						<input type="button" value="注 册" class="submit" tabindex="6" onclick="userCommit()" />
						<input type="reset" value="取 消" class="submit" tabindex="7" onclick="reset()" />
					</form>
				</div>
				<a href="login.html">已有账号，立即登陆</a>
			</div>
		</div>


		<script>
			//判断用户名是否可以被注册
			function testName() {
				var username = $("#username").val();
				// console.log("用户已经填写完用户名，当前的名字是"+username);
				//发送请求去验证用户名是否可用
				$.ajax({
					type: "get",
					url: "http://127.0.0.1:8333/login", //方法所在页面和方法名
					//contentType: "application/json; charset=utf-8",
					//data: "{username:'" + username + "'}",
					dataType: "json",
					success: function(data) {
						//开始解析data
						var nameList = [];
						var result = "";
						for (let i = 0; i < data.length; i++) {
							nameList.push(data[i].uid);
						}
						console.log(nameList);
						if (nameList.indexOf(username) == -1) {
							result = "该用户名可用";
						} else {
							result = "用户名被占用";
						}
						document.getElementById("text").innerHTML = result;
					},
					error: function(err) {
						console.log(err);
					}
				});
			}

			function createPerson(username, password, email, realname, cname, role) {
				var o = new Object()
				o.uid = username;
				o.password = password;
				o.email = email;
				o.realname = realname;
				o.cname = cname;
				o.role = role;
				return o
			}
			
			function getValue(){
				var result;
				var typelist=document.getElementsByName('utype');
				for(let i=0;i<typelist.length;i++){
					if(typelist[i].checked){
						result=typelist[i].value;
					}
				}
				console.log(typelist);
				console.log(result);
				return result;
			}

			//实现用户注册功能
			function userCommit() {

				var username = $("#username").val(); //用户名
				var password = $("#password").val(); //密码
				var email = $("#email").val(); //邮箱
				var realname = $("#realname").val(); //真实名字
				var cname = $("#cname").val(); //班级信息
				var role = parseInt(getValue()); //默认设置为学生用户
				
				console.log("当前选择的类别"+role);
				var postData = createPerson(username, password, email, realname, cname, role);
				$.ajax({
					type: "post", //要用post方式                 
					url: "http://127.0.0.1:8333//addUser1", //方法所在页面和方法名
					//contentType: "application/json; charset=utf-8",
					data: postData,
					dataType: "json",
					success: function(data) {
						if (data) {
							alert("用户注册成功");
							window.location.href = 'login.html';
						}
					},
					error: function(err) {
						console.log(err);
					}
				});
			}
		</script>
	</body>
</html>
