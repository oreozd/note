	<body>

		<!--底部-->
		<div id="footer"></div>
		<script>
			$(document).ready(function() {
				$("#footer").load("footer.html");
				// 页面头部加载完毕
				$("#header").load("header.html", function() {
					var userInfo = header.getElementsByTagName("span")[1];
					var username = sessionStorage.getItem("username");
					userInfo.innerHTML = username;

					//给头部用户信息绑定事件
					userInfo.onmouseenter = function() {
						document.getElementById("user-detail").style.visibility = "visible";
					}
					var contentbox = document.getElementsByClassName("container")[0];
					contentbox.onclick = function() {
						//alert("被点击");
						document.getElementById("user-detail").style.visibility = "hidden";
					}
				});
				getAllpro();
			});

			//获得所有案例
			function getAllpro() {
				$.ajax({
					type: "get", //要用post方式                 
					url: "json/pro.json", //方法所在页面和方法名
					async: false,
					contentType: "application/json; charset=utf-8",
					dataType: "json",
					success: function(data) {
						createList(data);
						console.log(data);
					},
					error: function(err) {
						console.log(err);
					}
				});
			}
			//获取指定类型的案例
			function getPro(type) {
				$.ajax({
					type: "get", //要用post方式                 
					url: "json/pro.json", //方法所在页面和方法名
					contentType: "application/json; charset=utf-8",
					dataType: "json",
					success: function(data) {
						var arr = [];
						for (let i = 0; i < data.length; i++) {
							if (data[i].ctype == type) {
								arr.push(data[i]);
							}
						}
						createList(arr);
					},
					error: function(err) {
						console.log(err);
					}
				});
			}

		
			function createList(data) {
				var strHTMLArray = [];
				for (let i = 0; i < data.length; i++) {
					var pimg = data[i].pimg;
					var title = data[i].ctitle;
					var username = data[i].username;
					var time = data[i].ctime;
					var id=data[i].id;
					var lis = createLi(pimg, title, username, time,id); //调用创建行的函数创建
					strHTMLArray.push(lis);
				}
				$('#ulBody').html(strHTMLArray.join(''));
			}

			
			function createLi(pimg, title, username, time,id) {
				var strHTMLArray = [];
				var HTMLstr = "";
				HTMLstr +="<li class='pro-item'>";
				HTMLstr +="<div class='pro-img'><img src='images/images_icon/"+pimg+"' id='proimg'/></div>"
				HTMLstr +="<div class='pro-title pro-info'><i class='layui-icon layui-icon-file'></i><a href='pro-chakan.html?ctitle="+title+"&pid="+id+"'>" + title + "</a></div>";
				HTMLstr +="<div class='pro-author pro-info'><i class='layui-icon layui-icon-user'></i><span>"+username+"</span></div>"
				HTMLstr +="<div class='pro-time pro-info'><i class='layui-icon layui-icon-log'></i><span>"+time+"</span></div>";
				HTMLstr +="</li>";
				return HTMLstr;
			}
		</script>
		<script src="layui/layui.all.js"></script>
	</body>
